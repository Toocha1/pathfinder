<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PathFinder — найди своё направление</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080c;
  --bg-soft:#0d0d13;
  --surface:rgba(255,255,255,.045);
  --surface-hover:rgba(255,255,255,.075);
  --border:rgba(255,255,255,.09);
  --border-strong:rgba(255,255,255,.16);
  --text:#f3f3f6;
  --text-dim:#9797a6;
  --text-faint:#616170;
  --violet:#8b7cff;
  --teal:#49d6c4;
  --gold:#f2c14e;
  --danger:#ff6b6b;
  --grad: linear-gradient(120deg,#8b7cff,#49d6c4);
  --radius:22px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(139,124,255,.16), transparent 60%),
    radial-gradient(900px 500px at 90% 0%, rgba(73,214,196,.10), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Manrope',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:rgba(139,124,255,.35);}

.wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
.topbar{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(14px);
  background:rgba(8,8,12,.65);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1080px;margin:0 auto;padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.02em;}
.logo-dot{width:9px;height:9px;border-radius:3px;background:var(--grad);}
.nav-links{display:flex;gap:6px;align-items:center;}
.nav-link{
  padding:8px 14px;border-radius:100px;font-size:14px;color:var(--text-dim);
  border:1px solid transparent;transition:all .2s ease;
}
.nav-link:hover{color:var(--text);background:var(--surface);}
.nav-link.active{color:var(--text);background:var(--surface);border-color:var(--border);}

section{padding:96px 0;}
.section-tight{padding:64px 0;}

/* HERO */
.hero{padding:120px 0 80px;text-align:center;position:relative;}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:100px;border:1px solid var(--border-strong);
  background:var(--surface);font-size:13px;color:var(--text-dim);margin-bottom:28px;
  font-family:'IBM Plex Mono',monospace;
}
.eyebrow span{color:var(--teal);}
.hero h1{
  font-size:clamp(34px,5.4vw,62px);line-height:1.06;letter-spacing:-.03em;
  font-weight:800;margin:0 0 22px;max-width:820px;margin-left:auto;margin-right:auto;
}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero p{
  font-size:18px;color:var(--text-dim);max-width:560px;margin:0 auto 40px;line-height:1.55;
}
.btn{
  border:none;border-radius:14px;padding:15px 28px;font-size:15px;font-weight:600;
  display:inline-flex;align-items:center;gap:8px;transition:all .22s cubic-bezier(.2,.8,.2,1);
}
.btn-primary{
  background:var(--grad);color:#07070a;
  box-shadow:0 8px 30px -8px rgba(139,124,255,.55);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 34px -8px rgba(139,124,255,.7);}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border-strong);}
.btn-ghost:hover{background:var(--surface-hover);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;pointer-events:none;}

/* CARDS GRID */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
@media(max-width:820px){.grid3{grid-template-columns:1fr;}.grid2{grid-template-columns:1fr;}}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:30px;backdrop-filter:blur(10px);
  animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
  transition:border-color .25s ease, transform .25s ease, background .25s ease;
}
.card:hover{border-color:var(--border-strong);background:var(--surface-hover);}
@keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.step-num{
  font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--teal);margin-bottom:16px;
}
.card h3{margin:0 0 10px;font-size:19px;letter-spacing:-.01em;}
.card p{margin:0;color:var(--text-dim);font-size:14.5px;line-height:1.55;}

.section-head{text-align:center;max-width:560px;margin:0 auto 48px;}
.section-head .eyebrow{margin-bottom:16px;}
.section-head h2{font-size:clamp(26px,3.4vw,38px);letter-spacing:-.02em;margin:0 0 12px;font-weight:800;}
.section-head p{color:var(--text-dim);font-size:15.5px;margin:0;}

.stats-row{display:flex;justify-content:center;gap:0;flex-wrap:wrap;margin-top:56px;border-top:1px solid var(--border);padding-top:40px;}
.stat{flex:1;min-width:200px;text-align:center;padding:0 20px;}
.stat .num{font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:600;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat .label{color:var(--text-dim);font-size:13.5px;margin-top:6px;}

footer{padding:50px 0 70px;text-align:center;color:var(--text-faint);font-size:13px;}

/* QUIZ */
.quiz-shell{max-width:640px;margin:60px auto;padding:0 24px;}
.progress-outer{height:5px;border-radius:10px;background:var(--surface);overflow:hidden;margin-bottom:36px;border:1px solid var(--border);}
.progress-inner{height:100%;background:var(--grad);border-radius:10px;transition:width .5s cubic-bezier(.2,.8,.2,1);}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.q-count{font-family:'IBM Plex Mono',monospace;color:var(--text-dim);font-size:13px;}
.q-text{font-size:23px;font-weight:700;letter-spacing:-.01em;line-height:1.35;margin:0 0 30px;font-family:'Manrope',sans-serif;animation:rise .45s ease both;}
.opt-list{display:flex;flex-direction:column;gap:10px;}
.opt{
  text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:17px 20px;font-size:15px;color:var(--text);transition:all .18s ease;
  animation:rise .45s ease both;
}
.opt:hover{border-color:var(--violet);background:var(--surface-hover);transform:translateX(3px);}
.quiz-nav{display:flex;justify-content:space-between;margin-top:26px;}
.link-btn{background:none;border:none;color:var(--text-faint);font-size:13.5px;padding:8px;}
.link-btn:hover{color:var(--text-dim);}

/* RESULTS */
.results-shell{max-width:820px;margin:50px auto 0;padding:0 24px;}
.result-card{
  background:var(--surface);border:1px solid var(--border);border-radius:26px;padding:30px;
  margin-bottom:18px;animation:rise .55s ease both;
}
.result-top{display:flex;align-items:center;gap:20px;}
.medal{font-size:30px;}
.ring-wrap{position:relative;width:74px;height:74px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;
}
.result-title{flex:1;}
.result-title h3{margin:0 0 3px;font-size:20px;}
.result-title .cat{color:var(--text-faint);font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;}
.result-body{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
.reasons{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 16px;}
.reason-chip{background:rgba(73,214,196,.1);border:1px solid rgba(73,214,196,.25);color:#8fe8db;font-size:13px;padding:6px 12px;border-radius:100px;}
.spec-list{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 20px;}
.spec-chip{background:var(--surface);border:1px solid var(--border);font-size:12.5px;padding:5px 11px;border-radius:8px;color:var(--text-dim);}

/* PRACTICE */
.day-card{max-width:600px;margin:50px auto;padding:0 24px;}
.day-badge{
  display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;
  font-size:13px;color:var(--teal);background:rgba(73,214,196,.08);border:1px solid rgba(73,214,196,.2);
  padding:6px 14px;border-radius:100px;margin-bottom:20px;
}
.day-dots{display:flex;gap:6px;margin-bottom:24px;}
.day-dot{width:26px;height:5px;border-radius:4px;background:var(--border);transition:background .3s;}
.day-dot.done{background:var(--teal);}
.day-dot.current{background:var(--violet);}
.task-box{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:32px;
  animation:rise .5s ease both;
}
.task-box h3{font-size:21px;margin:0 0 12px;font-weight:700;}
.task-box p{color:var(--text-dim);font-size:15px;line-height:1.6;margin:0;}
.feedback-block{margin-top:28px;padding-top:24px;border-top:1px solid var(--border);}
.f-row{margin-bottom:20px;}
.f-label{font-size:13.5px;color:var(--text-dim);margin-bottom:10px;}
.stars{display:flex;gap:6px;}
.star{font-size:24px;color:var(--border-strong);transition:color .15s;background:none;border:none;padding:2px;}
.star.on{color:var(--gold);}
.toggle2{display:flex;gap:8px;}
.toggle2 button{
  flex:1;padding:11px;border-radius:11px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);font-size:14px;font-weight:500;transition:all .18s;
}
.toggle2 button.sel{background:var(--surface-hover);border-color:var(--violet);color:var(--text);}

/* ROADMAP */
.roadmap-shell{max-width:760px;margin:50px auto;padding:0 24px;}
.roadmap-head{text-align:center;margin-bottom:40px;}
.overall-bar{max-width:420px;margin:20px auto 0;height:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.overall-fill{height:100%;background:var(--grad);transition:width .6s ease;}
.month-block{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 28px;
  margin-bottom:16px;animation:rise .5s ease both;
}
.month-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.month-head h3{margin:0;font-size:17px;}
.month-num{font-family:'IBM Plex Mono',monospace;color:var(--violet);font-size:13px;}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:9px 0;font-size:14.5px;color:var(--text-dim);cursor:pointer;}
.check-item.checked{color:var(--text-faint);text-decoration:line-through;}
.checkbox{
  width:19px;height:19px;border-radius:6px;border:1.5px solid var(--border-strong);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.checkbox.on{background:var(--grad);border-color:transparent;}

/* PROFILE */
.profile-shell{max-width:820px;margin:50px auto;padding:0 24px;}
.profile-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;}
@media(max-width:760px){.profile-grid{grid-template-columns:1fr;}}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;}
.mini-card h4{margin:0 0 14px;font-size:14px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.hist-row{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;border-bottom:1px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.achv{display:inline-flex;align-items:center;gap:8px;background:var(--surface-hover);border:1px solid var(--border);padding:8px 14px;border-radius:100px;font-size:13px;margin:0 8px 8px 0;}

.empty{color:var(--text-faint);font-size:14px;font-style:italic;}
.center-actions{text-align:center;margin-top:36px;}
.fadein{animation:fadeIn .5s ease both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ===== RESULTS: pros/cons/tools ===== */
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
@media(max-width:560px){.pros-cons{grid-template-columns:1fr;}}
.pc-col h5{margin:0 0 8px;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600;}
.pc-col.pros h5{color:#8fe8db;}
.pc-col.cons h5{color:#ff9d9d;}
.pc-col ul{margin:0;padding-left:18px;color:var(--text-dim);font-size:13.5px;line-height:1.6;}
.pc-col li{margin-bottom:4px;}
.tool-chip{background:rgba(139,124,255,.08);border:1px solid rgba(139,124,255,.22);color:#c8c1ff;font-size:12.5px;padding:5px 11px;border-radius:8px;}
.income-box{margin-top:16px;padding:14px 16px;border-radius:14px;background:rgba(242,193,78,.07);border:1px solid rgba(242,193,78,.22);font-size:13.5px;color:var(--text-dim);line-height:1.55;}
.income-box b{color:var(--gold);}

/* ===== PRACTICE: 7-step modules ===== */
.step-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px;}
.step-top h3{margin:0;font-size:21px;font-weight:700;}
.diff-stars{font-size:14px;color:var(--gold);white-space:nowrap;letter-spacing:1px;}
.diff-stars .off{color:var(--border-strong);}
.result-chip{
  display:inline-flex;align-items:center;gap:8px;margin:8px 0 22px;padding:9px 14px;border-radius:12px;
  background:rgba(73,214,196,.08);border:1px solid rgba(73,214,196,.22);color:#8fe8db;font-size:13.5px;font-weight:500;
}
.task-section{margin-bottom:18px;}
.task-section:last-of-type{margin-bottom:0;}
.task-section-label{font-size:13px;font-weight:600;color:var(--teal);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
.task-section p{margin:0;color:var(--text-dim);font-size:14.5px;line-height:1.6;}

/* ===== ROADMAP: 24-week ===== */
.skills-panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:24px;}
.skills-panel h4{margin:0 0 10px;font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.skill-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(139,124,255,.09);border:1px solid rgba(139,124,255,.22);color:#c8c1ff;font-size:12.5px;padding:5px 11px;border-radius:100px;margin:0 6px 6px 0;}
.week-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 26px;
  margin-bottom:14px;animation:rise .5s ease both;
}
.week-card.done{border-color:rgba(73,214,196,.35);}
.week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.week-head h3{margin:0;font-size:16px;}
.week-num{font-family:'IBM Plex Mono',monospace;color:var(--violet);font-size:12.5px;}
.week-main{font-size:14.5px;color:var(--text);line-height:1.55;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;margin-bottom:16px;font-size:13px;color:var(--text-dim);line-height:1.5;}
@media(max-width:640px){.week-grid{grid-template-columns:1fr;}}
.week-grid b{color:var(--text);font-weight:600;}
.checkpoint-banner{
  display:flex;align-items:center;gap:14px;margin:6px 0 20px;padding:18px 22px;border-radius:18px;
  background:linear-gradient(120deg,rgba(139,124,255,.14),rgba(73,214,196,.10));
  border:1px solid rgba(139,124,255,.3);
}
.checkpoint-banner .cp-icon{font-size:26px;}
.checkpoint-banner h4{margin:0 0 3px;font-size:15.5px;}
.checkpoint-banner p{margin:0;color:var(--text-dim);font-size:13px;line-height:1.5;}
.checkpoint-banner.reached{border-color:rgba(73,214,196,.45);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo"><span class="logo-dot"></span>PathFinder</div>
    <div class="nav-links" id="navLinks"></div>
  </div>
</div>

<div id="app"></div>

/* ============ HELPERS ============ */
const MAX_PER_SPHERE = {};
Object.keys(SPHERES).forEach(id=>MAX_PER_SPHERE[id]=0);
QUESTIONS.forEach(q=>{
  const maxes = {};
  q.o.forEach(opt=>{ Object.entries(opt.s).forEach(([id,v])=>{ maxes[id]=Math.max(maxes[id]||0,v); }); });
  Object.entries(maxes).forEach(([id,v])=>{ MAX_PER_SPHERE[id]+=v; });
});

function computeResults(){
  const totals = {};
  Object.keys(SPHERES).forEach(id=>totals[id]=0);
  state.answers.forEach(sMap=>{ Object.entries(sMap).forEach(([id,v])=>totals[id]+=v); });
  const arr = Object.entries(totals).map(([id,score])=>{
    const max = MAX_PER_SPHERE[id]||1;
    let pct = Math.round((score/max)*100);
    pct = Math.max(30, Math.min(97,pct));
    return {id,score,pct};
  });
  arr.sort((a,b)=>b.pct-a.pct);
  return arr;
}

function ring(pct,size=74,stroke=6,color="url(#g1)"){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c-(pct/100)*c;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}">
      <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#8b7cff"/><stop offset="100%" stop-color="#49d6c4"/>
      </linearGradient></defs>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="rgba(255,255,255,.08)" stroke-width="${stroke}" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"/>
    </svg>
    <div class="ring-pct">${pct}%</div>
  </div>`;
}

function medal(i){ return ["🥇","🥈","🥉"][i]||"🎯"; }

function fillTemplate(str, sphere, extra){
  extra = extra || {};
  return str
    .replace(/\{tool2\}/g, sphere.tools[1]||sphere.tools[0])
    .replace(/\{tool\}/g, sphere.tools[0])
    .replace(/\{skill2\}/g, sphere.skills[1]||sphere.skills[0])
    .replace(/\{skill\}/g, sphere.skills[0])
    .replace(/\{role\}/g, sphere.specialties[0])
    .replace(/\{community\}/g, extra.community||'')
    .replace(/\{platform\}/g, extra.platform||'')
    .replace(/\{showTo\}/g, extra.showTo||'')
    .replace(/\{name\}/g, sphere.name);
}

function buildPracticeSteps(sphere){
  const extra = GROUP_EXTRA[sphere.group];
  const bespoke = PRACTICE_BESPOKE[sphere.group];
  const steps = [];
  for(let i=0;i<7;i++){
    const n = i+1;
    const src = (n===3||n===4||n===6) ? bespoke[n] : GENERIC_STEP[n];
    steps.push({
      title: STEP_META[i].title,
      icon: STEP_META[i].icon,
      main: fillTemplate(src.main, sphere, extra),
      mini: fillTemplate(src.mini, sphere, extra),
      research: fillTemplate(src.research, sphere, extra),
      practice: fillTemplate(src.practice, sphere, extra),
      result: fillTemplate(src.result, sphere, extra),
      difficulty: STEP_DIFFICULTY[i],
    });
  }
  return steps;
}

function buildRoadmapWeeks(sphere){
  const extra = GROUP_EXTRA[sphere.group];
  const bank = ROADMAP_BANKS[sphere.group];
  const weeks = [];
  for(let i=0;i<24;i++){
    const s1 = bank.skills[(i*2) % bank.skills.length];
    const s2 = bank.skills[(i*2+1) % bank.skills.length];
    weeks.push({
      n:i+1,
      main: fillTemplate(WEEK_PATTERN[i], sphere, extra),
      learn: bank.learn[i % bank.learn.length],
      watch: bank.watch[i % bank.watch.length],
      read: bank.read[i % bank.read.length],
      portfolio: bank.portfolio[i % bank.portfolio.length],
      platform: bank.platforms[i % bank.platforms.length],
      person: bank.people[i % bank.people.length],
      skills: [s1,s2],
      checkpoint: (i+1)%4===0 ? CHECKPOINTS[((i+1)/4)-1] : null,
    });
  }
  return weeks;
}

function startQuiz(){
  state.screen='quiz'; state.qIndex=0; state.answers=[]; render();
}
function selectAnswer(optIdx){
  const q = QUESTIONS[state.qIndex];
  state.answers.push(q.o[optIdx].s);
  if(state.qIndex < QUESTIONS.length-1){
    state.qIndex++;
  } else {
    finishQuiz();
    return;
  }
  render();
}
function backQuiz(){
  if(state.qIndex>0){ state.qIndex--; state.answers.pop(); render(); }
  else { state.screen='home'; render(); }
}
function finishQuiz(){
  state.results = computeResults();
  state.testHistory.push({date:new Date().toLocaleDateString('ru-RU'), top: state.results.slice(0,3).map(r=>r.id)});
  addAchievement("Прошёл диагностику");
  state.screen='results';
  render();
}

  const q = QUESTIONS[state.qIndex];

function setStars(n){ state.cur.stars=n; renderPracticeInPlace(); }
function setUnexpected(v){ state.cur.unexpected=v; renderPracticeInPlace(); }
function setCont(v){ state.cur.cont=v; renderPracticeInPlace(); }
function renderPracticeInPlace(){ document.getElementById('app').innerHTML = shell(renderPractice()); }

function nextStep(){
  state.stepAnswers.push({...state.cur});
  if(state.stepIndex < 6){
    state.stepIndex++;
    state.cur = {stars:0,unexpected:null,cont:null};
    render();
  } else {
    finishPractice();
  }
}
function finishPractice(){
  const contYes = state.stepAnswers.filter(d=>d.cont===true).length;
  const wantsToContinue = contYes >= 4;
  state.practiceHistory.push({sphere:state.selectedSphere, continued:wantsToContinue, date:new Date().toLocaleDateString('ru-RU')});
  addAchievement("Прошёл практику из 7 шагов");
  if(wantsToContinue){
    state.screen='roadmap';
  } else {
    state.screen='practice-result-negative';
  }
  render();
}

      <div style="margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--teal);">${doneCount}/24 недель выполнено · ${pct}%</div>
    </div>
    ${learnedSkills.length? `<div class="skills-panel"><h4>После пройденных недель ты умеешь</h4>${learnedSkills.map(s=>`<span class="skill-chip">✔ ${s}</span>`).join('')}</div>` : ''}
    ${weeks.map((w,i)=>{
      const done = !!doneMap[i];
      let html = `<div class="week-card ${done?'done':''}" style="animation-delay:${Math.min(i,10)*0.03}s">
        <div class="week-head"><h3>Неделя ${w.n}</h3><span class="week-num">${w.n}/24</span></div>
        <div class="week-main">🛠 <b>Что сделать:</b> ${w.main}</div>
        <div class="week-grid">
          <div>📚 <b>Изучить:</b> ${w.learn}</div>
          <div>🎥 <b>Посмотреть:</b> ${w.watch}</div>
          <div>📖 <b>Прочитать:</b> ${w.read}</div>
          <div>💼 <b>В портфолио:</b> ${w.portfolio}</div>
          <div>🌍 <b>Зарегистрироваться:</b> ${w.platform}</div>
          <div>👥 <b>Пообщаться:</b> ${w.person}</div>
          <div style="grid-column:1/-1;">🧠 <b>Навыки недели:</b> ${w.skills.join(', ')}</div>
        </div>
        <div class="check-item ${done?'checked':''}" onclick="toggleWeek('${state.selectedSphere}',${i})">
          <div class="checkbox ${done?'on':''}">${done?'✓':''}</div>
          <div>${done? '🎯 Итог недели: неделя пройдена — навыки выше закреплены' : 'Отметить неделю пройденной'}</div>
        </div>
      </div>`;
      if(w.checkpoint){
        const cpTitle = fillTemplate(w.checkpoint.title, sp, extra);
        const cpDesc = fillTemplate(w.checkpoint.desc, sp, extra);
        html += `<div class="checkpoint-banner ${done?'reached':''}">
          <div class="cp-icon">🎯</div>
          <div><h4>${cpTitle}</h4><p>${cpDesc}</p></div>
        </div>`;
      }
      return html;
    }).join('')}
    <div class="center-actions">
      <button class="link-btn" onclick="goProfile()">Перейти в профиль →</button>
    </div>
  </div>`;
}

/* ============ RENDER: PROFILE ============ */
function goProfile(){ state.screen='profile'; render(); }
function renderProfile(){
  const last = state.testHistory[state.testHistory.length-1];
  return `
  <div class="profile-shell fadein">
    <div class="section-head" style="text-align:left;max-width:none;margin-bottom:32px;">
      <div class="eyebrow">Личный кабинет</div>
      <h2>Твой прогресс</h2>
    </div>
    <div class="profile-grid">
      <div class="mini-card">
        <h4>История диагностики</h4>
        ${state.testHistory.length===0?'<div class="empty">Пока нет пройденных тестов</div>':
          state.testHistory.slice().reverse().map(h=>`
          <div class="hist-row"><span>${h.date}</span><span>${h.top.map(id=>SPHERES[id].emoji).join(' ')} ${h.top.map(id=>SPHERES[id].name).join(', ')}</span></div>
          `).join('')}
      </div>
      <div class="mini-card">
        <h4>Практика из 7 шагов</h4>
        ${state.practiceHistory.length===0?'<div class="empty">Пока нет пройденных практик</div>':
          state.practiceHistory.slice().reverse().map(p=>`
          <div class="hist-row"><span>${SPHERES[p.sphere].emoji} ${SPHERES[p.sphere].name}</span><span>${p.continued?'✅ подошло':'⛔ не моё'}</span></div>
          `).join('')}
      </div>
      <div class="mini-card">
        <h4>Текущее направление</h4>
        ${state.selectedSphere?`
          <div style="font-size:15px;margin-bottom:10px;">${SPHERES[state.selectedSphere].emoji} ${SPHERES[state.selectedSphere].name}</div>
          <button class="btn btn-ghost" style="width:100%;justify-content:center;" onclick="state.screen='roadmap';render();">Открыть дорожную карту</button>
        `:'<div class="empty">Направление ещё не выбрано</div>'}
      </div>
      <div class="mini-card">
        <h4>Достижения</h4>
        ${state.achievements.length===0?'<div class="empty">Пока нет достижений</div>':
          state.achievements.map(a=>`<span class="achv">🏆 ${a}</span>`).join('')}
      </div>
    </div>
    <div class="center-actions">
      <button class="btn btn-primary" onclick="startQuiz()">Пройти диагностику заново</button>
    </div>
  </div>`;
}

/* ============ MASTER RENDER ============ */
function shell(inner){ return inner; }
function render(){
  let html='';
  if(state.screen==='home') html = renderHome();
  else if(state.screen==='quiz') html = renderQuiz();
  else if(state.screen==='results') html = renderResults();
  else if(state.screen==='practice') html = renderPractice();
  else if(state.screen==='practice-result-negative') html = renderPracticeNegative();
  else if(state.screen==='roadmap') html = renderRoadmap();
  else if(state.screen==='profile') html = renderProfile();
  document.getElementById('app').innerHTML = html;
  renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
render();
</script>
</body>
</html>
