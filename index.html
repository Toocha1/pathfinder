     spec; clickjacking protection has to be a real HTTP header set at the hosting layer. -->

:root{
  --bg:#08080c;
  --bg-soft:#0d0d13;
  --surface:rgba(255,255,255,.045);
  --surface-hover:rgba(255,255,255,.075);
  --border:rgba(255,255,255,.09);
  --border-strong:rgba(255,255,255,.16);
  --text:#f3f3f6;
  --text-dim:#9797a6;
  --text-faint:#7d7d94;
  --violet:#8b7cff;
  --teal:#49d6c4;
  --gold:#f2c14e;
  --danger:#ff6b6b;
  --grad: linear-gradient(120deg,#8b7cff,#49d6c4);
  --radius:22px;
  --r-pill:100px;
}
:root[data-theme="light"]{
  --bg:#f6f6fa;
  --bg-soft:#ffffff;
  --surface:rgba(20,20,35,.035);
  --surface-hover:rgba(20,20,35,.065);
  --border:rgba(20,20,35,.10);
  --border-strong:rgba(20,20,35,.18);
  --text:#15151e;
  --text-dim:#54546a;
  --text-faint:#6b6b80;
  --violet:#6d54e0;
  --teal:#0d9a86;
  --gold:#b8790f;
  --danger:#d6453a;
  --grad: linear-gradient(120deg,#6d54e0,#0d9a86);
}
:root[data-theme="light"] body{
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(109,84,224,.08), transparent 60%),
    radial-gradient(900px 500px at 90% 0%, rgba(13,154,134,.06), transparent 55%),
    var(--bg);
}
:root[data-theme="light"] .reason-chip{background:rgba(13,154,134,.08);border-color:rgba(13,154,134,.28);color:#0a7d6d;}
:root[data-theme="light"] .pc-col.pros h5{color:#0a7d6d;}
:root[data-theme="light"] .pc-col.cons h5{color:#c23a30;}
:root[data-theme="light"] .tool-chip{background:rgba(109,84,224,.07);border-color:rgba(109,84,224,.25);color:#5642c4;}
:root[data-theme="light"] .result-chip{background:rgba(13,154,134,.08);border-color:rgba(13,154,134,.28);color:#0a7d6d;}
:root[data-theme="light"] .skill-chip{background:rgba(109,84,224,.08);border-color:rgba(109,84,224,.25);color:#5642c4;}
:root[data-theme="light"] .btn-primary{color:#fff;}
:root[data-theme="light"] .checkpoint-banner{background:linear-gradient(120deg,rgba(109,84,224,.10),rgba(13,154,134,.08));}
:root[data-theme="light"] .topbar{background:rgba(246,246,250,.75);}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:
    radial-gradient(1100px 600px at 15% -10%, rgba(139,124,255,.16), transparent 60%),
    radial-gradient(900px 500px at 90% 0%, rgba(73,214,196,.10), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Manrope',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:rgba(139,124,255,.35);}

.wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
.topbar{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(14px);
  background:rgba(8,8,12,.65);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1080px;margin:0 auto;padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.02em;}
.logo-dot{width:9px;height:9px;border-radius:3px;background:var(--grad);}
.nav-links{display:flex;gap:6px;align-items:center;}
.nav-link{
  padding:8px 14px;border-radius:var(--r-pill);font-size:14px;color:var(--text-dim);
  border:1px solid transparent;transition:all .2s ease;
}
.nav-link:hover{color:var(--text);background:var(--surface);}
.nav-link.active{color:var(--text);background:var(--surface);border-color:var(--border);}
@media(max-width:480px){
  .topbar-inner{padding:12px 14px;}
  .logo{font-size:14px;gap:6px;}
  .nav-links{gap:2px;}
  .nav-link{padding:6px 9px;font-size:12px;}
  .theme-toggle{width:30px;height:30px;font-size:13px;}
}

section{padding:96px 0;}
.section-tight{padding:64px 0;}

/* HERO */
.hero{padding:120px 0 80px;text-align:center;position:relative;}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:var(--r-pill);border:1px solid var(--border-strong);
  background:var(--surface);font-size:13px;color:var(--text-dim);margin-bottom:28px;
  font-family:'IBM Plex Mono',monospace;
}
.eyebrow span{color:var(--teal);}
.hero h1{
  font-size:clamp(34px,5.4vw,62px);line-height:1.06;letter-spacing:-.03em;
  font-weight:800;margin:0 0 22px;max-width:820px;margin-left:auto;margin-right:auto;
}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero p{
  font-size:18px;color:var(--text-dim);max-width:560px;margin:0 auto 40px;line-height:1.55;
}
.btn{
  border:none;border-radius:14px;padding:15px 28px;font-size:15px;font-weight:600;
  display:inline-flex;align-items:center;gap:8px;transition:all .22s cubic-bezier(.2,.8,.2,1);
}
.btn-primary{
  background:var(--grad);color:#07070a;
  box-shadow:0 8px 30px -8px rgba(139,124,255,.55);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 34px -8px rgba(139,124,255,.7);}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border-strong);}
.btn-ghost:hover{background:var(--surface-hover);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;pointer-events:none;}

/* CARDS GRID */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
@media(max-width:820px){.grid3{grid-template-columns:1fr;}.grid2{grid-template-columns:1fr;}}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:30px;backdrop-filter:blur(10px);
  animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
  transition:border-color .25s ease, transform .25s ease, background .25s ease;
}
.card:hover{border-color:var(--border-strong);background:var(--surface-hover);}
@keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.step-num{
  font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--teal);margin-bottom:16px;
}
.card h3{margin:0 0 10px;font-size:19px;letter-spacing:-.01em;}
.card p{margin:0;color:var(--text-dim);font-size:14.5px;line-height:1.55;}

.section-head{text-align:center;max-width:560px;margin:0 auto 48px;}
.section-head .eyebrow{margin-bottom:16px;}
.section-head h2{font-size:clamp(26px,3.4vw,38px);letter-spacing:-.02em;margin:0 0 12px;font-weight:800;}
.section-head p{color:var(--text-dim);font-size:15.5px;margin:0;}

.stats-row{display:flex;justify-content:center;gap:0;flex-wrap:wrap;margin-top:56px;border-top:1px solid var(--border);padding-top:40px;}
.stat{flex:1;min-width:200px;text-align:center;padding:0 20px;}
.stat .num{font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:600;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat .label{color:var(--text-dim);font-size:13.5px;margin-top:6px;}

footer{padding:50px 0 70px;text-align:center;color:var(--text-faint);font-size:13px;}

/* QUIZ */
.quiz-shell{max-width:640px;margin:60px auto;padding:0 24px;}
.progress-outer{height:5px;border-radius:10px;background:var(--surface);overflow:hidden;margin-bottom:36px;border:1px solid var(--border);}
.progress-inner{height:100%;background:var(--grad);border-radius:10px;transition:width .5s cubic-bezier(.2,.8,.2,1);}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.q-count{font-family:'IBM Plex Mono',monospace;color:var(--text-dim);font-size:13px;}
.quiz-milestone{font-size:13px;font-weight:600;color:var(--teal);margin:14px 0 -6px;animation:rise .4s ease both;}
.q-text{font-size:23px;font-weight:700;letter-spacing:-.01em;line-height:1.35;margin:0 0 30px;font-family:'Manrope',sans-serif;animation:rise .45s ease both;}
.opt-list{display:flex;flex-direction:column;gap:10px;}
.opt{
  text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:17px 20px;font-size:15px;color:var(--text);transition:all .18s ease;
  animation:rise .45s ease both;
}
.opt:hover{border-color:var(--violet);background:var(--surface-hover);transform:translateX(3px);}
.quiz-nav{display:flex;justify-content:space-between;margin-top:26px;}
.link-btn{background:none;border:none;color:var(--text-faint);font-size:13.5px;padding:8px;}
.link-btn:hover{color:var(--text-dim);}

/* RESULTS */
.results-shell{max-width:820px;margin:50px auto 0;padding:0 24px;}
.result-card{
  background:var(--surface);border:1px solid var(--border);border-radius:26px;padding:30px;
  margin-bottom:18px;animation:rise .55s ease both;
}
.result-top{display:flex;align-items:center;gap:20px;}
.medal{font-size:30px;}
.ring-wrap{position:relative;width:74px;height:74px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;
}
.result-title{flex:1;}
.result-title h3{margin:0 0 3px;font-size:20px;}
.result-title .cat{color:var(--text-faint);font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;}
.result-body{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
.reasons{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 16px;}
.reason-chip{background:rgba(73,214,196,.1);border:1px solid rgba(73,214,196,.25);color:#8fe8db;font-size:13px;padding:6px 12px;border-radius:var(--r-pill);}
.spec-list{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 20px;}
.spec-chip{background:var(--surface);border:1px solid var(--border);font-size:12.5px;padding:5px 11px;border-radius:8px;color:var(--text-dim);}

/* PRACTICE */
.day-card{max-width:600px;margin:50px auto;padding:0 24px;}
.day-badge{
  display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;
  font-size:13px;color:var(--teal);background:rgba(73,214,196,.08);border:1px solid rgba(73,214,196,.2);
  padding:6px 14px;border-radius:var(--r-pill);margin-bottom:20px;
}
.day-dots{display:flex;gap:6px;margin-bottom:24px;}
.day-dot{width:26px;height:5px;border-radius:4px;background:var(--border);transition:background .3s;}
.day-dot.done{background:var(--teal);}
.day-dot.current{background:var(--violet);}
.task-box{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:32px;
  animation:rise .5s ease both;
}
.task-box h3{font-size:21px;margin:0 0 12px;font-weight:700;}
.task-box p{color:var(--text-dim);font-size:15px;line-height:1.6;margin:0;}
.feedback-block{margin-top:28px;padding-top:24px;border-top:1px solid var(--border);}
.f-row{margin-bottom:20px;}
.f-label{font-size:13.5px;color:var(--text-dim);margin-bottom:10px;}
.stars{display:flex;gap:6px;}
.star{font-size:24px;color:var(--border-strong);transition:color .15s;background:none;border:none;padding:2px;}
.star.on{color:var(--gold);}
.toggle2{display:flex;gap:8px;}
.toggle2 button{
  flex:1;padding:11px;border-radius:11px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);font-size:14px;font-weight:500;transition:all .18s;
}
.toggle2 button.sel{background:var(--surface-hover);border-color:var(--violet);color:var(--text);}

/* ROADMAP */
.roadmap-shell{max-width:760px;margin:50px auto;padding:0 24px;}
.roadmap-head{text-align:center;margin-bottom:40px;}
.overall-bar{max-width:420px;margin:20px auto 0;height:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.overall-fill{height:100%;background:var(--grad);transition:width .6s ease;}
.month-block{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 28px;
  margin-bottom:16px;animation:rise .5s ease both;
}
.month-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.month-head h3{margin:0;font-size:17px;}
.month-num{font-family:'IBM Plex Mono',monospace;color:var(--violet);font-size:13px;}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:9px 0;font-size:14.5px;color:var(--text-dim);cursor:pointer;}
.check-item.checked{color:var(--text-faint);text-decoration:line-through;}
.checkbox{
  width:19px;height:19px;border-radius:6px;border:1.5px solid var(--border-strong);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.checkbox.on{background:var(--grad);border-color:transparent;}

/* PROFILE */
.profile-shell{max-width:820px;margin:50px auto;padding:0 24px;}
.profile-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;}
@media(max-width:760px){.profile-grid{grid-template-columns:1fr;}}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;}
.mini-card h4{margin:0 0 14px;font-size:14px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.hist-row{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;border-bottom:1px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.achv{display:inline-flex;align-items:center;gap:8px;background:var(--surface-hover);border:1px solid var(--border);padding:8px 14px;border-radius:var(--r-pill);font-size:13px;margin:0 8px 8px 0;}

.empty{color:var(--text-faint);font-size:14px;font-style:italic;}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 10px 8px;text-align:center;color:var(--text-faint);font-size:13px;}
.empty-icon svg{width:40px;height:40px;opacity:.45;}
.center-actions{text-align:center;margin-top:36px;}
.fadein{animation:fadeIn .5s ease both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ===== RESULTS: pros/cons/tools ===== */
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
@media(max-width:560px){.pros-cons{grid-template-columns:1fr;}}
.pc-col h5{margin:0 0 8px;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600;}
.pc-col.pros h5{color:#8fe8db;}
.pc-col.cons h5{color:#ff9d9d;}
.pc-col ul{margin:0;padding-left:18px;color:var(--text-dim);font-size:13.5px;line-height:1.6;}
.pc-col li{margin-bottom:4px;}
.tool-chip{background:rgba(139,124,255,.08);border:1px solid rgba(139,124,255,.22);color:#c8c1ff;font-size:12.5px;padding:5px 11px;border-radius:8px;}
.income-box{margin-top:16px;padding:14px 16px;border-radius:14px;background:rgba(242,193,78,.07);border:1px solid rgba(242,193,78,.22);font-size:13.5px;color:var(--text-dim);line-height:1.55;}
.income-box b{color:var(--gold);}
.salary-row{display:flex;gap:14px;margin:16px 0;flex-wrap:wrap;}
.salary-box{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
.salary-box .sal-label{font-size:12px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.salary-box .sal-val{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--teal);font-weight:600;}
.salary-box.confident .sal-val{color:var(--violet);}
.compare-wrap{overflow-x:auto;margin:28px 0 40px;border:1px solid var(--border);border-radius:18px;background:var(--surface);}
.compare-table{width:100%;border-collapse:collapse;min-width:640px;}
.compare-table th,.compare-table td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text-dim);}
.compare-table thead th{color:var(--text);font-size:14px;font-weight:700;font-family:'Manrope',sans-serif;white-space:nowrap;}
.compare-table tbody tr:last-child td{border-bottom:none;}
.compare-table td:first-child,.compare-table th:first-child{color:var(--text-faint);font-size:12px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.compare-table td.pct-cell{font-family:'IBM Plex Mono',monospace;color:var(--teal);font-weight:600;}

/* ===== PRACTICE: 7-step modules ===== */
.step-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px;}
.step-top h3{margin:0;font-size:21px;font-weight:700;}
.diff-stars{font-size:14px;color:var(--gold);white-space:nowrap;letter-spacing:1px;}
.diff-stars .off{color:var(--border-strong);}
.result-chip{
  display:inline-flex;align-items:center;gap:8px;margin:8px 0 22px;padding:9px 14px;border-radius:12px;
  background:rgba(73,214,196,.08);border:1px solid rgba(73,214,196,.22);color:#8fe8db;font-size:13.5px;font-weight:500;
}
.task-section{margin-bottom:18px;}
.task-section:last-of-type{margin-bottom:0;}
.task-section-label{font-size:13px;font-weight:600;color:var(--teal);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
.task-section p{margin:0;color:var(--text-dim);font-size:14.5px;line-height:1.6;}

/* ===== ROADMAP: 24-week ===== */
.skills-panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:24px;}
.skills-panel h4{margin:0 0 10px;font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.skill-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(139,124,255,.09);border:1px solid rgba(139,124,255,.22);color:#c8c1ff;font-size:12.5px;padding:5px 11px;border-radius:var(--r-pill);margin:0 6px 6px 0;}
.week-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 26px;
  margin-bottom:14px;animation:rise .5s ease both;
}
.week-card.done{border-color:rgba(73,214,196,.35);background:rgba(73,214,196,.05);}
.week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.week-head-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.week-head h3{margin:0;font-size:16px;}
.week-num{font-family:'IBM Plex Mono',monospace;color:var(--violet);font-size:12.5px;}
.week-card.has-checkpoint{border-color:rgba(73,214,196,.4);box-shadow:0 0 0 1px rgba(73,214,196,.08) inset;}
.week-checkpoint-flag{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--teal);
  background:rgba(73,214,196,.13);border:1px solid rgba(73,214,196,.35);border-radius:var(--r-pill);padding:4px 10px 4px 8px;
  white-space:nowrap;
}
.week-checkpoint-flag .cp-flag-dot{font-size:11px;}
.week-collapsed-title .week-checkpoint-flag{margin-left:8px;}
.week-main{font-size:14.5px;color:var(--text);line-height:1.55;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;margin-bottom:16px;font-size:13px;color:var(--text-dim);line-height:1.5;}
@media(max-width:640px){.week-grid{grid-template-columns:1fr;}}
.week-grid b{color:var(--text);font-weight:600;}
.week-grid a{color:var(--teal);text-decoration:underline;text-underline-offset:2px;text-decoration-color:color-mix(in srgb, var(--teal) 45%, transparent);}
.week-grid a:hover{text-decoration-color:var(--teal);}
.week-notes{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.week-notes-label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:8px;}
.week-notes-input{width:100%;min-height:56px;background:var(--bg-soft);border:1px solid var(--border);border-radius:12px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:13.5px;line-height:1.5;resize:vertical;}
.week-notes-input:focus{outline:none;border-color:var(--violet);}
.week-notes-input::placeholder{color:var(--text-faint);}
.checkpoint-banner{
  display:flex;align-items:center;gap:14px;margin:6px 0 20px;padding:18px 22px;border-radius:18px;
  background:linear-gradient(120deg,rgba(139,124,255,.14),rgba(73,214,196,.10));
  border:1px solid rgba(139,124,255,.3);
}
.checkpoint-banner .cp-icon{font-size:26px;}
.checkpoint-banner h4{margin:0 0 3px;font-size:15.5px;}
.checkpoint-banner p{margin:0;color:var(--text-dim);font-size:13px;line-height:1.5;}
.checkpoint-banner.reached{border-color:rgba(73,214,196,.45);}
.cp-quiz{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:16px;}
.cp-quiz-prompt{font-size:13.5px;color:var(--text);font-weight:600;margin-bottom:8px;}
.cp-quiz-opts{display:flex;flex-direction:column;gap:6px;}
.cp-quiz-opt{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--text-dim);transition:all .15s;}
.cp-quiz-opt:hover:not(:disabled){border-color:var(--violet);background:var(--surface-hover);}
.cp-quiz-opt.selected{border-color:var(--violet);background:var(--surface-hover);color:var(--text);}
.cp-quiz-opt.correct{border-color:var(--teal);background:rgba(73,214,196,.12);color:var(--text);}
.cp-quiz-opt.incorrect{border-color:var(--danger);background:rgba(255,107,107,.10);color:var(--text);}
.cp-quiz-opt:disabled{cursor:default;}
.cp-quiz-result{margin-top:2px;font-size:13.5px;color:var(--text-dim);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.cp-quiz-progress{font-size:12.5px;color:var(--text-faint);font-family:'IBM Plex Mono',monospace;}
.cp-jump-block{margin-top:18px;}
.cp-jump-label{font-size:12.5px;font-weight:600;color:var(--teal);display:flex;align-items:center;justify-content:center;gap:6px;}
.cp-jump-weeks{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
.cp-jump-week{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:5px 12px;border-radius:var(--r-pill);background:rgba(73,214,196,.08);border:1px solid rgba(73,214,196,.3);color:var(--text-dim);}
.week-card.collapsed{padding:16px 26px;cursor:pointer;transition:border-color .18s;}
.week-card.collapsed:hover{border-color:var(--border-strong);}
.week-collapsed-row{display:flex;align-items:center;gap:14px;}
.week-collapsed-title{flex:1;font-size:14.5px;color:var(--text-dim);}
.week-collapsed-expand{font-size:12px;color:var(--text-faint);}
.week-collapse-btn{background:none;border:none;color:var(--text-faint);font-size:12px;padding:4px 8px;border-radius:8px;}
.week-collapse-btn:hover{color:var(--text-dim);background:var(--surface-hover);}

@media print{
  .no-print{display:none !important;}
  html,body{background:#fff !important;}
  body{color:#111 !important;}
  .roadmap-shell{max-width:100%;}
  .week-card,.skills-panel,.checkpoint-banner{
    background:#fff !important;border:1px solid #ccc !important;box-shadow:none !important;
    break-inside:avoid;page-break-inside:avoid;animation:none !important;
  }
  .week-card{margin-bottom:10px;}
  .week-main{border-bottom-color:#ddd !important;}
  h1,h2,h3,h4,.week-num,.overall-fill,.grad-text{color:#111 !important;-webkit-text-fill-color:#111 !important;background:none !important;}
  .week-grid,.week-grid b{color:#333 !important;}
  .week-main{color:#111 !important;}
  .eyebrow{border-color:#ccc !important;background:none !important;color:#333 !important;}
  .overall-bar{border-color:#ccc !important;background:#eee !important;}
  .overall-fill{background:#666 !important;}
  .skill-chip{background:#f2f2f2 !important;border-color:#ccc !important;color:#333 !important;}
  .checkbox{border-color:#999 !important;}
  .checkbox.on{background:#333 !important;}
  .certificate-card{background:#fff !important;border-color:#333 !important;box-shadow:none !important;}
  .certificate-card::before{border-color:#333 !important;}
  .certificate-title,.certificate-sphere,.certificate-name-input{color:#111 !important;-webkit-text-fill-color:#111 !important;}
  .certificate-meta,.certificate-desc{color:#333 !important;}
  .certificate-skill{background:#f2f2f2 !important;border-color:#ccc !important;color:#333 !important;}
  .certificate-seal{color:#333 !important;border-color:#333 !important;}
}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;scroll-behavior:auto !important;}
  .marquee-track{animation:none !important;}
}

/* ===== CERTIFICATE ===== */
.certificate-shell{max-width:720px;margin:50px auto;padding:0 24px;}
.certificate-card{
  position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:56px 48px;text-align:center;animation:rise .5s ease both;
}
.certificate-card::before{
  content:"";position:absolute;inset:14px;border:1px solid color-mix(in srgb, var(--violet) 30%, transparent);
  border-radius:12px;pointer-events:none;
}
.certificate-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);}
.certificate-emoji{font-size:46px;margin:18px 0 6px;}
.certificate-title{font-size:26px;font-weight:800;margin:0 0 10px;}
.certificate-sphere{font-size:19px;font-weight:700;color:var(--teal);margin-bottom:18px;}
.certificate-desc{color:var(--text-dim);font-size:14px;line-height:1.6;max-width:480px;margin:0 auto 22px;}
.certificate-name-input{
  width:100%;max-width:420px;margin:0 auto 22px;display:block;text-align:center;
  background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--text);
  font-size:20px;font-weight:700;font-family:inherit;padding:4px 8px 10px;
}
.certificate-name-input:focus{outline:none;border-bottom-color:var(--violet);}
.certificate-name-input::placeholder{color:var(--text-faint);font-weight:400;}
.certificate-meta{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--text-faint);margin-bottom:24px;}
.certificate-skills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:26px;}
.certificate-skill{font-size:12px;padding:6px 12px;border-radius:var(--r-pill);background:var(--surface-hover);border:1px solid var(--border);color:var(--text-dim);}
.certificate-seal{
  display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:var(--r-pill);
  border:2px solid var(--gold);color:var(--gold);font-size:26px;margin-top:4px;
}
.certificate-actions{display:flex;gap:10px;justify-content:center;margin-top:28px;}

/* ===== CATALOG ===== */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;}
.filter-chip{padding:8px 14px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:13px;transition:all .18s;}
.filter-chip:hover{background:var(--surface-hover);color:var(--text);}
.filter-chip.active{background:var(--grad);color:#07070a;border-color:transparent;font-weight:600;}
.theme-toggle{width:36px;height:36px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.theme-toggle:hover{background:var(--surface-hover);color:var(--text);}
.badge-grid{display:flex;flex-wrap:wrap;gap:10px;}
.badge-item{display:flex;align-items:center;gap:8px;background:var(--surface-hover);border:1px solid var(--border);padding:9px 14px;border-radius:var(--r-pill);font-size:12.5px;margin:0 8px 8px 0;}
.badge-icon{font-size:17px;}
.badge-text{display:flex;flex-direction:column;}
.badge-text .bt-title{font-weight:600;color:var(--text);font-size:12.5px;}
.badge-text .bt-desc{color:var(--text-faint);font-size:11.5px;margin-top:1px;}
.progress-mini{margin-bottom:16px;}
.progress-mini:last-of-type{margin-bottom:0;}
.progress-mini .pm-label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;}
.progress-mini .pm-bar{height:6px;border-radius:10px;background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.progress-mini .pm-fill{height:100%;background:var(--grad);border-radius:10px;transition:width .4s ease;}

/* ===== LANDING: marquee ribbon ===== */
.marquee-wrap{overflow:hidden;padding:22px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:8px 0 0;mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);}
.marquee-track{display:flex;gap:10px;width:max-content;animation:marquee 55s linear infinite;}
.marquee-track:hover{animation-play-state:paused;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.marquee-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:var(--r-pill);font-size:13px;white-space:nowrap;color:var(--text-dim);}

/* ===== LANDING: preview card ===== */
.preview-card{position:relative;}
.preview-badge{position:absolute;top:22px;right:22px;background:var(--grad);color:#07070a;font-size:11px;font-weight:700;padding:5px 12px;border-radius:var(--r-pill);letter-spacing:.05em;text-transform:uppercase;}

/* ===== LANDING: FAQ ===== */
.faq-list{max-width:680px;margin:0 auto;}
.faq-item{border-bottom:1px solid var(--border);padding:16px 4px;}
.faq-item summary{cursor:pointer;font-weight:600;font-size:15px;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item summary::after{content:'+';font-size:20px;color:var(--text-faint);flex-shrink:0;transition:transform .2s;}
.faq-item[open] summary::after{transform:rotate(45deg);}
.faq-item p{margin:12px 0 0;color:var(--text-dim);font-size:14px;line-height:1.6;}
.cert-more{margin-top:2px;}
.cert-more summary{cursor:pointer;list-style:none;font-size:13.5px;color:var(--text-faint);padding:8px 0;}
.cert-more summary::-webkit-details-marker{display:none;}
.cert-more summary:hover{color:var(--text-dim);}
.cert-more[open] summary{display:none;}

/* ===== CONFETTI ===== */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti-piece{position:absolute;top:-20px;border-radius:2px;opacity:0;animation:confetti-fall linear forwards;}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(108vh) rotate(var(--rot));opacity:.7;}
}
.save-toast{
  position:fixed;bottom:24px;right:24px;background:var(--surface-hover);border:1px solid var(--border-strong);
  color:var(--text);font-size:13px;padding:10px 16px;border-radius:var(--r-pill);
  opacity:0;transform:translateY(8px);transition:opacity .25s ease, transform .25s ease;
  z-index:9998;pointer-events:none;backdrop-filter:blur(8px);
}
.save-toast.show{opacity:1;transform:translateY(0);}
.quiz-kbd-hint{margin-top:18px;text-align:center;font-size:12px;color:var(--text-faint);}
.step-icon-svg{display:inline-flex;vertical-align:-5px;color:var(--violet);}
.step-icon-svg svg{width:22px;height:22px;}
.catalog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:820px){.catalog-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.catalog-grid{grid-template-columns:1fr;}}
.catalog-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;animation:rise .4s ease both;transition:border-color .2s;}
.catalog-card:hover{border-color:var(--border-strong);}
.cc-emoji{font-size:26px;margin-bottom:10px;}
.catalog-card h3{margin:0 0 4px;font-size:16px;letter-spacing:-.01em;}
.cc-group{font-size:11.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.catalog-card p{margin:0;color:var(--text-dim);font-size:13px;line-height:1.5;}
.catalog-empty{text-align:center;color:var(--text-faint);padding:40px 0;}
.catalog-search{width:100%;max-width:440px;padding:13px 20px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;margin-bottom:24px;transition:border-color .2s;}
.catalog-search:focus{outline:none;border-color:var(--violet);}
.catalog-search::placeholder{color:var(--text-faint);}

/* ===== CONTINUE BANNER (home, returning users) ===== */
.continue-banner{
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border-strong);border-radius:20px;
  padding:20px 24px;margin:32px auto 0;max-width:1080px;
}
.cb-left{display:flex;align-items:center;gap:14px;}
.cb-emoji{font-size:28px;flex-shrink:0;}
.cb-title{font-weight:700;font-size:15px;}
.cb-sub{color:var(--text-dim);font-size:13px;margin-top:2px;}

/* ===== A11Y: focus-visible for custom (non-native) interactive elements ===== */
.check-item:focus-visible,.cp-quiz-opt:focus-visible,.week-card.collapsed:focus-visible{outline:2px solid var(--violet);outline-offset:3px;border-radius:10px;}

/* ===== BOOT: loading / data-fetch-error states ===== */
.boot-screen{max-width:520px;margin:120px auto;padding:0 24px;text-align:center;color:var(--text-dim);}
.boot-spinner{width:34px;height:34px;margin:0 auto 22px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--violet);animation:boot-spin .8s linear infinite;}
@keyframes boot-spin{to{transform:rotate(360deg);}}
.boot-screen h3{color:var(--text);font-size:19px;margin:0 0 10px;}
.boot-screen .boot-error-detail{margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--text-faint);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;white-space:pre-wrap;word-break:break-word;}
</style>
</head>

<script>
/* ============ DATA (fetched at boot from ./data/*.json, see loadAllData()) ============
   The 59-sphere / 50-question / 24-week content used to live here as ~1950
   lines of hand-authored JS object literals inside this one <script>. That
   meant a single stray comma anywhere in that mass of data could take down
   the entire page with a blank screen. It's now split into data/*.json,
   fetched once at startup — a JSON typo breaks JSON.parse() with a clear
   error instead of a silent whole-page syntax error, and it's editable
   without touching any code. See loadAllData()/initDerivedData()/boot() below. */
let GROUPS, GROUP_COLORS, PLATFORM_URLS, PLATFORM_REGEX, SALARY, SPHERES, QUESTIONS,
    STEP_META, REFLECTION_QUESTIONS, STEP_DIFFICULTY, GENERIC_STEP, GROUP_EXTRA,
    PRACTICE_BESPOKE, PRACTICE_SPHERE_OVERRIDE, PRACTICE_SPHERE_OVERRIDE_34,
    WEEK_PATTERN, CHECKPOINTS, ROADMAP_BANKS,
    HOW_STEPS, FAQ_ITEMS, MAX_PER_SPHERE;

const DATA_FILES = {
  groups: "data/groups.json",
  platforms: "data/platforms.json",
  salary: "data/salary.json",
  spheres: "data/spheres.json",
  questions: "data/questions.json",
  practiceMeta: "data/practice-meta.json",
  practiceBespoke: "data/practice-bespoke.json",
  roadmap: "data/roadmap.json",
  content: "data/content.json",
};

async function loadAllData(){
  // Artifact-bundled build: data/*.json is embedded as inline
  // <script type="application/json"> tags (see just above <div id="app">)
  // instead of being fetched, since this sandbox has no relative files to
  // fetch from. The real project on disk still loads via fetch(); only this
  // bundled copy reads from the DOM.
  const TAG_IDS = {
    groups: "embedded-data-groups",
    platforms: "embedded-data-platforms",
    salary: "embedded-data-salary",
    spheres: "embedded-data-spheres",
    questions: "embedded-data-questions",
    practiceMeta: "embedded-data-practice-meta",
    practiceBespoke: "embedded-data-practice-bespoke",
    roadmap: "embedded-data-roadmap",
    content: "embedded-data-content",
  };
  const keys = Object.keys(DATA_FILES);
  const data = {};
  keys.forEach((key)=>{
    const el = document.getElementById(TAG_IDS[key]);
    if(!el) throw new Error(`Embedded data tag #${TAG_IDS[key]} not found`);
    try { data[key] = JSON.parse(el.textContent); }
    catch(e){ throw new Error(`Embedded data #${TAG_IDS[key]} is not valid JSON: ${e.message}`); }
  });

  GROUPS = data.groups.GROUPS;
  GROUP_COLORS = data.groups.GROUP_COLORS;
  PLATFORM_URLS = data.platforms;
  SALARY = data.salary;
  SPHERES = data.spheres;
  QUESTIONS = data.questions;
  STEP_META = data.practiceMeta.STEP_META;
  REFLECTION_QUESTIONS = data.practiceMeta.REFLECTION_QUESTIONS;
  STEP_DIFFICULTY = data.practiceMeta.STEP_DIFFICULTY;
  GENERIC_STEP = data.practiceMeta.GENERIC_STEP;
  GROUP_EXTRA = data.practiceMeta.GROUP_EXTRA;
  PRACTICE_BESPOKE = data.practiceBespoke.PRACTICE_BESPOKE;
  PRACTICE_SPHERE_OVERRIDE = data.practiceBespoke.PRACTICE_SPHERE_OVERRIDE;
  PRACTICE_SPHERE_OVERRIDE_34 = data.practiceBespoke.PRACTICE_SPHERE_OVERRIDE_34;
  WEEK_PATTERN = data.roadmap.WEEK_PATTERN;
  CHECKPOINTS = data.roadmap.CHECKPOINTS;
  ROADMAP_BANKS = data.roadmap.ROADMAP_BANKS;
  HOW_STEPS = data.content.HOW_STEPS;
  FAQ_ITEMS = data.content.FAQ_ITEMS;
}

// Derived data that used to run as top-level immediate code right after the
// const declarations. Now deferred until loadAllData() has actually populated
// SPHERES/QUESTIONS/PLATFORM_URLS (see boot() at the bottom of the file).
function initDerivedData(){
  Object.keys(SPHERES).forEach(id=>{ SPHERES[id].id = id; });

  MAX_PER_SPHERE = {};
  Object.keys(SPHERES).forEach(id=>MAX_PER_SPHERE[id]=0);
  QUESTIONS.forEach(q=>{
    const maxes = {};
    q.o.forEach(opt=>{ Object.entries(opt.s).forEach(([id,v])=>{ maxes[id]=Math.max(maxes[id]||0,v); }); });
    Object.entries(maxes).forEach(([id,v])=>{ MAX_PER_SPHERE[id]+=v; });
  });

  PLATFORM_REGEX = new RegExp('(' + Object.keys(PLATFORM_URLS).sort((a,b)=>b.length-a.length).map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|') + ')', 'g');
}
function linkifyPlatforms(text){
  return text.replace(PLATFORM_REGEX, (m)=>`<a href="${PLATFORM_URLS[m]}" target="_blank" rel="noopener noreferrer">${m}</a>`);
}



/* ============ STATE ============ */
const STORAGE_KEY = "pathfinder_state_v1";
// Bump STATE_VERSION and add a step to MIGRATIONS whenever the *shape* of
// state changes (e.g. roadmap/checkpointQuizzes growing a new nesting level) —
// otherwise old saves silently break or render something unexpected instead
// of failing loudly or degrading gracefully.
const STATE_VERSION = 2;
const DEFAULT_STATE = {
  version: STATE_VERSION,
  screen:"home",
  answers:[], qIndex:0, results:[], selectedSphere:null,
  stepIndex:0, stepAnswers:[], cur:{stars:0,unexpected:null,cont:null},
  testHistory:[], practiceHistory:[],
  roadmap:{},
  achievements:[],
  addedRoadmapAchv:false,
  catalogFilter:"all",
  catalogSearch:"",
  weekNotes:{},
  checkpointQuizzes:{},
  expandedWeeks:{},
  certifiedSpheres:{},
  certificateName:"",
};
// Real state is assigned inside boot(), once loadAllData() has resolved:
// loadState() below needs SPHERES to validate a saved selectedSphere, and
// SPHERES doesn't exist yet at module-parse time. This placeholder just keeps
// every function that reads `state.*` from throwing before boot() runs.
let state = {...DEFAULT_STATE};

function addAchievement(a){ if(!state.achievements.includes(a)) state.achievements.push(a); }

const ACHIEVEMENT_BADGES = {
  "Прошёл диагностику": {icon:"🎯", desc:"50 вопросов позади"},
  "Прошёл практику из 7 шагов": {icon:"🚀", desc:"Полный цикл практики хотя бы в одном направлении"},
  "Начал 24-недельную дорожную карту": {icon:"🗺️", desc:"Первый шаг длинного пути"},
  "Прошёл дорожную карту (24/24)": {icon:"🎓", desc:"Полная программа до конца — можно забирать сертификат"},
};

// Keyed by the state.version a saved blob was tagged with; each step migrates
// it forward exactly one version. loadState() runs a save through every step
// from its version up to STATE_VERSION, so a save from several versions back
// migrates through all of them in one pass.
const MIGRATIONS = {
  // Version 0 = anything saved before versioning existed (no `version` field
  // at all). The schema hasn't actually changed since then, but this is where
  // future shape changes to roadmap/checkpointQuizzes/weekNotes/expandedWeeks
  // get normalized defensively, so old saves degrade gracefully instead of
  // rendering garbage or throwing deep inside a render function.
  0: function migrateFrom0(s){
    s.roadmap = (s.roadmap && typeof s.roadmap === 'object') ? s.roadmap : {};
    Object.keys(s.roadmap).forEach(sphereId=>{
      if(!s.roadmap[sphereId] || typeof s.roadmap[sphereId] !== 'object') s.roadmap[sphereId] = {};
    });
    s.weekNotes = (s.weekNotes && typeof s.weekNotes === 'object') ? s.weekNotes : {};
    s.expandedWeeks = (s.expandedWeeks && typeof s.expandedWeeks === 'object') ? s.expandedWeeks : {};
    return s;
  },
  // Version 1 -> 2: the per-checkpoint reflection was a set of generic
  // self-report checkboxes (`checkpointChecks`) — replaced with an actual
  // auto-generated multiple-choice quiz built from the sphere's own
  // tools/skills/specialties (`checkpointQuizzes`). Old checkbox state
  // doesn't map onto quiz answers, so it's just dropped.
  1: function migrateFrom1(s){
    delete s.checkpointChecks;
    s.checkpointQuizzes = (s.checkpointQuizzes && typeof s.checkpointQuizzes === 'object') ? s.checkpointQuizzes : {};
    return s;
  },
};

function migrateState(raw){
  let s = raw;
  let v = typeof s.version === 'number' ? s.version : 0;
  while(v < STATE_VERSION){
    const step = MIGRATIONS[v];
    if(!step){
      // Unknown gap in the migration chain (e.g. a save written by a future
      // app version being opened in an older one). Resetting is safer than
      // rendering with a shape we don't recognize.
      console.warn('PathFinder: не знаю, как мигрировать сохранение с version', v, '— сбрасываю прогресс к дефолтному состоянию.');
      return {...DEFAULT_STATE};
    }
    s = step(s);
    v++;
  }
  s.version = STATE_VERSION;
  return s;
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {...DEFAULT_STATE};
    let saved = JSON.parse(raw);
    saved = migrateState(saved);
    const merged = {...DEFAULT_STATE, ...saved};
    // guard against stale/corrupted references to spheres/screens that no longer exist
    if(merged.selectedSphere && !SPHERES[merged.selectedSphere]) merged.selectedSphere = null;
    if(!['home','catalog','quiz','results','practice','practice-result-negative','roadmap','profile','certificate'].includes(merged.screen)) merged.screen = 'home';
    if((merged.screen==='practice'||merged.screen==='practice-result-negative'||merged.screen==='roadmap'||merged.screen==='certificate') && !merged.selectedSphere) merged.screen = 'home';
    if(merged.screen==='certificate' && !merged.certifiedSpheres[merged.selectedSphere]) merged.screen = 'home';
    if(merged.screen==='quiz' && (!Array.isArray(merged.answers))) merged.screen = 'home';
    return merged;
  } catch(e) {
    return {...DEFAULT_STATE};
  }
}
let appBooted = false;
let saveToastTimer = null;
function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if(appBooted) queueSaveToast();
  } catch(e) { /* storage unavailable or full — fail silently */ }
}
function queueSaveToast(){
  clearTimeout(saveToastTimer);
  saveToastTimer = setTimeout(showSaveToast, 700);
}
function showSaveToast(){
  let toast = document.getElementById('saveToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'saveToast';
    toast.className = 'save-toast no-print';
    document.body.appendChild(toast);
  }
  toast.textContent = '✓ Сохранено';
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(toast.__hideTimer);
  toast.__hideTimer = setTimeout(()=>{ toast.classList.remove('show'); }, 1800);
}
function resetProgress(){
  const weeksDone = Object.values(state.roadmap||{}).reduce((sum,m)=> sum + Object.values(m).filter(Boolean).length, 0);
  const spheresWithProgress = Object.keys(state.roadmap||{}).filter(id=> Object.values(state.roadmap[id]).some(Boolean)).length;
  const certCount = Object.keys(state.certifiedSpheres||{}).length;
  const parts = [];
  if(state.testHistory.length) parts.push(`${state.testHistory.length} тест${state.testHistory.length===1?'':'ов'} в истории диагностики`);
  if(state.practiceHistory.length) parts.push(`${state.practiceHistory.length} практик${state.practiceHistory.length===1?'а':'и'}`);
  if(weeksDone) parts.push(`${weeksDone} пройденных недель по ${spheresWithProgress} направлени${spheresWithProgress===1?'ю':'ям'}`);
  if(certCount) parts.push(`${certCount} сертификат${certCount===1?'':'а'}`);
  const detail = parts.length ? `Будет удалено: ${parts.join(', ')}.` : 'Сейчас прогресса ещё нет — сбрасывать нечего.';
  if(!confirm(`Сбросить весь прогресс?\n\n${detail}\n\nЭто нельзя отменить. Если нужно сохранить — сначала скачай резервную копию в профиле.`)) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {...DEFAULT_STATE};
  render();
}
function exportProgress(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pathfinder-progress-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function triggerImportProgress(){
  const input = document.getElementById('importProgressInput');
  if(input) input.click();
}
// Backups are just JSON someone picked off their disk — treat the shape as
// untrusted input, not merely "possibly the wrong file". Wrong-typed fields get
// reset to their DEFAULT_STATE shape instead of being trusted as-is, and every
// sphere-keyed dict is filtered down to real SPHERES ids so nothing here can
// smuggle an arbitrary object key or a non-object value into state.
function sanitizeImportedState(raw){
  const s = {...DEFAULT_STATE, ...raw};
  const isPlainObject = v => v && typeof v === 'object' && !Array.isArray(v);
  if(!Array.isArray(s.testHistory)) s.testHistory = [];
  s.testHistory = s.testHistory
    .filter(h=> isPlainObject(h) && typeof h.date === 'string' && Array.isArray(h.top))
    .map(h=>({date: h.date, top: h.top.filter(id=> typeof id === 'string' && SPHERES[id])}));
  if(!Array.isArray(s.practiceHistory)) s.practiceHistory = [];
  s.practiceHistory = s.practiceHistory.filter(p=> isPlainObject(p) && typeof p.sphere === 'string' && SPHERES[p.sphere]);
  if(!Array.isArray(s.achievements)) s.achievements = [];
  s.achievements = s.achievements.filter(a=> typeof a === 'string' && ACHIEVEMENT_BADGES[a]);
  ['roadmap','weekNotes','checkpointQuizzes','expandedWeeks'].forEach(key=>{
    if(!isPlainObject(s[key])) s[key] = {};
    Object.keys(s[key]).forEach(sphereId=>{ if(!SPHERES[sphereId]) delete s[key][sphereId]; });
  });
  if(!isPlainObject(s.certifiedSpheres)) s.certifiedSpheres = {};
  Object.keys(s.certifiedSpheres).forEach(sphereId=>{
    if(!SPHERES[sphereId] || typeof s.certifiedSpheres[sphereId] !== 'string') delete s.certifiedSpheres[sphereId];
  });
  if(typeof s.certificateName !== 'string') s.certificateName = '';
  if(typeof s.selectedSphere !== 'string' || !SPHERES[s.selectedSphere]) s.selectedSphere = null;
  return s;
}
const IMPORT_MAX_BYTES = 2 * 1024 * 1024;
function importProgress(fileInput){
  const file = fileInput.files && fileInput.files[0];
  if(!file) return;
  if(file.size > IMPORT_MAX_BYTES){
    alert('Файл слишком большой для резервной копии PathFinder (максимум 2 МБ).');
    fileInput.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const raw = JSON.parse(reader.result);
      if(!raw || typeof raw !== 'object' || Array.isArray(raw)) throw new Error('not an object');
      if(!confirm('Загрузить резервную копию? Текущий прогресс в этом браузере будет заменён.')){ fileInput.value = ''; return; }
      state = sanitizeImportedState(migrateState(raw));
      saveState();
      render();
    }catch(e){
      alert('Не получилось прочитать файл — это не резервная копия PathFinder или файл повреждён.');
    }
    fileInput.value = '';
  };
  reader.readAsText(file);
}
/* ============ HELPERS ============ */
// (SPHERES[id].id assignment and MAX_PER_SPHERE now live in initDerivedData(),
// since both depend on data that only arrives asynchronously via loadAllData().)

function computeResults(){
  const totals = {};
  Object.keys(SPHERES).forEach(id=>totals[id]=0);
  state.answers.forEach(sMap=>{ Object.entries(sMap).forEach(([id,v])=>totals[id]+=v); });
  const arr = Object.entries(totals).map(([id,score])=>{
    const max = MAX_PER_SPHERE[id]||1;
    const ratio = score/max; // unclamped — the real signal used for ranking
    let pct = Math.round(ratio*100);
    pct = Math.max(30, Math.min(97,pct)); // clamped only for the number shown on screen
    return {id,score,ratio,pct};
  });
  // Sort by the unclamped ratio (raw score as a tiebreaker), not by the clamped
  // display pct — two spheres both clamped to e.g. 97% used to be ordered
  // arbitrarily by object-declaration order instead of by who actually scored higher.
  arr.sort((a,b)=> b.ratio-a.ratio || b.score-a.score);
  return arr;
}

function getSalary(id){
  return (SALARY && SALARY[id]) || {start:"—", confident:"—"};
}

function hasReachedRoadmap(sphereId){
  const doneMap = state.roadmap[sphereId] || {};
  const doneCount = Object.values(doneMap).filter(Boolean).length;
  return doneCount>0 || state.practiceHistory.some(p=>p.sphere===sphereId && p.continued);
}

function hasAnyProgress(){
  if(state.testHistory.length>0 || state.practiceHistory.length>0) return true;
  return Object.keys(state.roadmap||{}).some(id=>Object.values(state.roadmap[id]||{}).some(Boolean));
}

function ring(pct,size=74,stroke=6,color="url(#g1)"){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c-(pct/100)*c;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}">
      <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#8b7cff"/><stop offset="100%" stop-color="#49d6c4"/>
      </linearGradient></defs>

function fillTemplate(str, sphere, extra){
  extra = extra || {};
  return str
    .replace(/\{tool2\}/g, sphere.tools[1]||sphere.tools[0])
    .replace(/\{tool\}/g, sphere.tools[0])
    .replace(/\{skill2\}/g, sphere.skills[1]||sphere.skills[0])
    .replace(/\{skill\}/g, sphere.skills[0])
    .replace(/\{role\}/g, sphere.specialties[0])
    .replace(/\{community\}/g, extra.community||'')
    .replace(/\{platform\}/g, extra.platform||'')
    .replace(/\{showTo\}/g, extra.showTo||'')
    .replace(/\{name\}/g, sphere.name);
}

// per-sphere data (unlike steps 1,2,5,7, which have a GENERIC_STEP fallback
// baked in already) — see buildPracticeSteps() below.
const FALLBACK_BESPOKE_STEP = {
  main: "Найди небольшую практическую задачу в этом направлении и доведи её до конкретного результата — от начала до готового артефакта.",

  result: "Первый практический результат",
};
const FALLBACK_ROADMAP_BANK = {
  learn:["(данные не найдены)"], watch:["(данные не найдены)"], read:["(данные не найдены)"],
  portfolio:["(данные не найдены)"], platforms:["(данные не найдены)"], people:["(данные не найдены)"],
  skills:["(данные не найдены)","(данные не найдены)"],
};

function buildPracticeSteps(sphere){
  const extra = GROUP_EXTRA[sphere.group] || {};
  const bespoke = PRACTICE_BESPOKE[sphere.group];
  if(!bespoke){
    console.error(`PathFinder: нет PRACTICE_BESPOKE для группы "${sphere.group}" (направление "${sphere.id}") — шаги 3/4/6 практики покажут заглушку вместо содержания.`);
  }
  const steps = [];
  const ov6 = PRACTICE_SPHERE_OVERRIDE[sphere.id];
  const ov34 = PRACTICE_SPHERE_OVERRIDE_34[sphere.id];
  for(let i=0;i<7;i++){
    const n = i+1;
    const bespokeStep = bespoke && bespoke[n];
    const base = (n===3||n===4||n===6) ? (bespokeStep || FALLBACK_BESPOKE_STEP) : GENERIC_STEP[n];
    const override = (ov6 && ov6[n]) || (ov34 && ov34[n]) || null;
    const src = override ? {...base, ...override} : base;
    steps.push({
      title: STEP_META[i].title,
      icon: STEP_META[i].icon,
      main: fillTemplate(src.main, sphere, extra),
      mini: fillTemplate(src.mini, sphere, extra),
      research: fillTemplate(src.research, sphere, extra),
      practice: fillTemplate(src.practice, sphere, extra),
      result: fillTemplate(src.result, sphere, extra),
      difficulty: STEP_DIFFICULTY[i],
    });
  }
  return steps;
}

function buildRoadmapWeeks(sphere){
  const extra = GROUP_EXTRA[sphere.group] || {};
  const bank = ROADMAP_BANKS[sphere.group];
  if(!bank){
    console.error(`PathFinder: нет ROADMAP_BANKS для группы "${sphere.group}" (направление "${sphere.id}") — дорожная карта покажет заглушку вместо содержания.`);
  }
  const safeBank = bank || FALLBACK_ROADMAP_BANK;
  const weeks = [];
  for(let i=0;i<24;i++){
    const s1 = safeBank.skills[(i*2) % safeBank.skills.length];
    const s2 = safeBank.skills[(i*2+1) % safeBank.skills.length];
    weeks.push({
      n:i+1,
      main: fillTemplate(WEEK_PATTERN[i], sphere, extra),
      learn: safeBank.learn[i % safeBank.learn.length],
      watch: safeBank.watch[i % safeBank.watch.length],
      read: safeBank.read[i % safeBank.read.length],
      portfolio: safeBank.portfolio[i % safeBank.portfolio.length],
      platform: safeBank.platforms[i % safeBank.platforms.length],
      person: safeBank.people[i % safeBank.people.length],
      skills: [s1,s2],
      checkpoint: (i+1)%4===0 ? CHECKPOINTS[((i+1)/4)-1] : null,
    });
  }
  return weeks;
}

function animateCounters(){
  const els = document.querySelectorAll('.stat .num[data-target]');
  if(!els.length) return;
  const animateEl = (el)=>{
    const target = parseInt(el.getAttribute('data-target'),10);
    const suffix = el.getAttribute('data-suffix')||'';
    const duration = 900;
    const start = performance.now();
    function step(now){
      const p = Math.min(1,(now-start)/duration);
      const val = Math.round(target*(1-Math.pow(1-p,3)));
      el.textContent = val + suffix;
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  };
  if('IntersectionObserver' in window){
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){ animateEl(entry.target); obs.unobserve(entry.target); }
      });
    }, {threshold:0.4});
    els.forEach(el=>obs.observe(el));
  } else {
    els.forEach(animateEl);
  }
}

function setStars(n){ state.cur.stars=n; renderPracticeInPlace(); }
function setUnexpected(v){ state.cur.unexpected=v; renderPracticeInPlace(); }
function setCont(v){ state.cur.cont=v; renderPracticeInPlace(); }
function renderPracticeInPlace(){ document.getElementById('app').innerHTML = renderPractice(); saveState(); }

function nextStep(){
  state.stepAnswers.push({...state.cur});
  if(state.stepIndex < 6){
    state.stepIndex++;
    state.cur = {stars:0,unexpected:null,cont:null};
    render();
  } else {
    finishPractice();
  }
}
function prevStep(){
  if(state.stepIndex===0) return; // nothing before step 1 to correct
  // The answer for the step we're returning to was pushed onto stepAnswers
  // when "next" was clicked — pop it back into `cur` so it's shown pre-filled
  // and editable, instead of getting duplicated once the user hits next again.
  state.cur = state.stepAnswers.pop() || {stars:0,unexpected:null,cont:null};
  state.stepIndex--;
  render();
}
function finishPractice(){
  const contYes = state.stepAnswers.filter(d=>d.cont===true).length;
  const wantsToContinue = contYes >= 4;
  state.practiceHistory.push({sphere:state.selectedSphere, continued:wantsToContinue, date:new Date().toLocaleDateString('ru-RU')});
  addAchievement("Прошёл практику из 7 шагов");
  if(wantsToContinue){
    state.screen='roadmap';
  } else {
    state.screen='practice-result-negative';
  }
  render();
  fireConfetti();
}

  if(!state.addedRoadmapAchv){ addAchievement("Начал 24-недельную дорожную карту"); state.addedRoadmapAchv=true; }
  if(newVal){
    const doneCount = Object.values(state.roadmap[sphereId]).filter(Boolean).length;
    if(doneCount===24 && !state.certifiedSpheres[sphereId]){
      state.certifiedSpheres[sphereId] = new Date().toISOString().slice(0,10);
      addAchievement("Прошёл дорожную карту (24/24)");

  saveState();
  if(newVal && (weekIdx+1)%4===0) fireConfetti();

function printRoadmap(){
  // Collapsed "done" weeks render a one-line summary with no learn/watch/read/
  // portfolio content in the DOM at all (not just CSS-hidden) — printing as-is
  // would silently drop that content from the PDF. Force everything open,
  // print, then put the on-screen collapse state back the way it was.
  const sphereId = state.selectedSphere;
  state.expandedWeeks[sphereId] = state.expandedWeeks[sphereId] || {};
  const prevExpanded = {...state.expandedWeeks[sphereId]};
  for(let i=0;i<24;i++){ state.expandedWeeks[sphereId][i] = true; }
  rerenderRoadmap();
  const restore = ()=>{
    state.expandedWeeks[sphereId] = prevExpanded;
    rerenderRoadmap();
    window.removeEventListener('afterprint', restore);
  };
  window.addEventListener('afterprint', restore);
  setTimeout(()=>{ window.print(); }, 50);
}

// Checkpoint quiz: real multiple-choice questions generated from each
// sphere's own tools/skills/specialties (replaces the old generic self-report
// checkboxes). Deterministic — seeded by sphere id + checkpoint index — so
// the same questions and option order show up on every re-render instead of
// reshuffling on every click.
function hashStr(s){
  let h = 5381;
  for(let i=0;i<s.length;i++){ h = ((h*33) ^ s.charCodeAt(i)) >>> 0; }
  return h;
}
function shuffleDeterministic(arr, seed){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = hashStr(seed+'|'+i) % (i+1);
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Checkpoint tests are knowledge checks, not to-do-list recall: each question asks
// something real about a topic the person studied in the 4 weeks leading up to the
// checkpoint (from KNOWLEDGE_QUIZ_BANK), so passing it actually means they understood
// the material — not just that they remember what the roadmap told them to do.
function buildCheckpointQuiz(sphere, cpIdx, weeks){
  const blockStart = cpIdx*4, blockEnd = blockStart+4;
  const block = weeks.slice(blockStart, blockEnd);
  if(block.length < 4) return [];
  const outsideBlock = weeks.filter((w,idx)=> idx<blockStart || idx>=blockEnd);
  const seedBase = `${sphere.id}|${cpIdx}`;
  const questions = [];

  const knowledgeBank = KNOWLEDGE_QUIZ_BANK[sphere.group] || {};
  const blockTopics = [];
  block.forEach(w=>{ if(!blockTopics.includes(w.learn)) blockTopics.push(w.learn); });
  // The "learn" bank is only 8 topics deep, so a 4-topic block repeats verbatim
  // every other checkpoint (checkpoints 0/2/4 share one pool, 1/3/5 share another).
  // When that happens, deterministically drop a different topic each time the same
  // pool recurs so repeating checkpoints never land on the exact same 3 questions.
  const selectedTopics = blockTopics.length > 3
    ? blockTopics.filter((_,idx)=> idx !== Math.floor(cpIdx/2) % blockTopics.length)
    : blockTopics;
  const topicOrder = selectedTopics.slice().sort((a,b)=> hashStr(seedBase+'|topic|'+a) - hashStr(seedBase+'|topic|'+b));
  for(const topic of topicOrder){
    if(questions.length >= 3) break;
    const kq = knowledgeBank[topic];
    if(!kq) continue;
    const options = shuffleDeterministic([kq.correct, ...kq.distractors], seedBase+'|'+topic+'|s');
    questions.push({ prompt: kq.prompt, options, correctIndex: options.indexOf(kq.correct) });
  }
  if(questions.length >= 3) return questions;

  // Fallback below only fires if a sphere's group is missing from KNOWLEDGE_QUIZ_BANK
  // (shouldn't happen for the 17 real groups — it's a safety net for the dev-error
  // FALLBACK_ROADMAP_BANK case) so a checkpoint never ends up with fewer than 3
  // questions. Falls back to recall-style questions built from the block's own content.
  function collect(range, getter){
    const vals = [];
    range.forEach(w=>{
      const v = getter(w);
      if(Array.isArray(v)) v.forEach(x=>{ if(x && !vals.includes(x)) vals.push(x); });
      else if(v && !vals.includes(v)) vals.push(v);
    });
    return vals;
  }

  function buildQuestion(key, promptText, correctPool, getter, extraExclude){
    if(!correctPool.length) return null;
    const correct = correctPool[hashStr(seedBase+'|'+key+'|c') % correctPool.length];
    const exclude = new Set([correct, ...(extraExclude||[])]);
    const distractorPool = collect(outsideBlock, getter).filter(v=>!exclude.has(v));
    if(distractorPool.length < 3) return null;
    const ranked = distractorPool.slice().sort((a,b)=> hashStr(seedBase+'|'+key+'|'+a) - hashStr(seedBase+'|'+key+'|'+b));
    const options = shuffleDeterministic([correct, ...ranked.slice(0,3)], seedBase+'|'+key+'|s');
    return { prompt: promptText, options, correctIndex: options.indexOf(correct) };
  }

  const range = block[0].n===block[block.length-1].n ? `${block[0].n}` : `${block[0].n}–${block[block.length-1].n}`;
  const weekPick = block[hashStr(seedBase+'|mw') % block.length];
  const mainQ = buildQuestion('main', `Что нужно было сделать на неделе ${weekPick.n}?`, [weekPick.main], w=>w.main, []);
  if(mainQ) questions.push(mainQ);

  const order = CHECKPOINT_QUIZ_CATEGORIES.slice().sort((a,b)=> hashStr(seedBase+'|order|'+a.key) - hashStr(seedBase+'|order|'+b.key));
  for(const cat of order){
    if(questions.length >= 3) break;
    const pool = collect(block, cat.getter);
    const q = buildQuestion(cat.key, cat.prompt(range), pool, cat.getter, pool);
    if(q) questions.push(q);
  }

  return questions;
}
function selectQuizAnswer(sphereId, cpIdx, qIdx, optIdx){
  state.checkpointQuizzes[sphereId] = state.checkpointQuizzes[sphereId] || {};
  const cp = state.checkpointQuizzes[sphereId][cpIdx] = state.checkpointQuizzes[sphereId][cpIdx] || {selected:{}, submitted:false};
  if(cp.submitted) return; // locked until "пройти ещё раз"
  cp.selected[qIdx] = optIdx;
  rerenderRoadmap();
  saveState();
}
function submitCheckpointQuiz(sphereId, cpIdx){
  state.checkpointQuizzes[sphereId] = state.checkpointQuizzes[sphereId] || {};
  const cp = state.checkpointQuizzes[sphereId][cpIdx] = state.checkpointQuizzes[sphereId][cpIdx] || {selected:{}, submitted:false};
  cp.submitted = true;
  rerenderRoadmap();
  saveState();
  const banner = document.getElementById('checkpoint-'+cpIdx);
  if(banner) banner.scrollIntoView({behavior: prefersReducedMotion() ? 'auto' : 'smooth', block:'center'});
}
function retryCheckpointQuiz(sphereId, cpIdx){
  state.checkpointQuizzes[sphereId] = state.checkpointQuizzes[sphereId] || {};

  rerenderRoadmap();
  saveState();
}
function toggleWeekExpand(sphereId, weekIdx){
  state.expandedWeeks[sphereId] = state.expandedWeeks[sphereId] || {};
  state.expandedWeeks[sphereId][weekIdx] = !state.expandedWeeks[sphereId][weekIdx];
  rerenderRoadmap();
  saveState();
}
function renderCheckpointBanner(w, i, sp, extra, done, weeks){
  const cpTitle = fillTemplate(w.checkpoint.title, sp, extra);
  const cpDesc = fillTemplate(w.checkpoint.desc, sp, extra);
  const cpIdx = Math.floor(i/4);
  const quiz = buildCheckpointQuiz(sp, cpIdx, weeks);
  const cpState = (state.checkpointQuizzes[state.selectedSphere] && state.checkpointQuizzes[state.selectedSphere][cpIdx]) || {selected:{}, submitted:false};
  const answeredCount = quiz.filter((q,qi)=> cpState.selected[qi]!==undefined).length;
  const allAnswered = quiz.length>0 && answeredCount===quiz.length;
  let correctCount = 0;
  if(cpState.submitted){ quiz.forEach((q,qi)=>{ if(cpState.selected[qi]===q.correctIndex) correctCount++; }); }
  return `<div class="checkpoint-banner ${done?'reached':''}" id="checkpoint-${cpIdx}">
    <div class="cp-icon">🎯</div>
    <div style="flex:1;">
      <h4>${cpTitle}</h4><p>${cpDesc}</p>
      ${quiz.length ? `<div class="cp-quiz">
        ${quiz.map((q,qi)=>{
          const sel = cpState.selected[qi];
          return `<div class="cp-quiz-q">
            <div class="cp-quiz-prompt">${qi+1}. ${q.prompt}</div>
            <div class="cp-quiz-opts">
              ${q.options.map((opt,oi)=>{
                let cls='cp-quiz-opt';
                if(sel===oi) cls+=' selected';
                if(cpState.submitted && oi===q.correctIndex) cls+=' correct';
                if(cpState.submitted && sel===oi && oi!==q.correctIndex) cls+=' incorrect';
                return `<button class="${cls}" ${cpState.submitted?'disabled':''} onclick="selectQuizAnswer('${state.selectedSphere}',${cpIdx},${qi},${oi})">${opt}</button>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
        ${cpState.submitted
          ? `<div class="cp-quiz-result">${correctCount===quiz.length?'🎉':'📝'} Правильных ответов: ${correctCount} из ${quiz.length} <button class="link-btn" onclick="retryCheckpointQuiz('${state.selectedSphere}',${cpIdx})">Пройти ещё раз</button></div>`
          : `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
              <button class="btn btn-ghost cp-quiz-submit" ${allAnswered?'':'disabled'} onclick="submitCheckpointQuiz('${state.selectedSphere}',${cpIdx})">Проверить ответы</button>
              ${!allAnswered ? `<span class="cp-quiz-progress">Отвечено ${answeredCount} из ${quiz.length}</span>` : ''}
            </div>`}
      </div>` : ''}
    </div>
  </div>`;
}

      </div>`;
      if(w.checkpoint) html += renderCheckpointBanner(w, i, sp, extra, done, weeks);
      return html;

      <button class="link-btn" onclick="goProfile()">Перейти в профиль →</button>
    </div>

}

        <h4>Мои сертификаты</h4>

        ${rest.length ? `<details class="cert-more"><summary>Ещё ${rest.length}</summary>${rest.map(row).join('')}</details>` : ''}
      </div>`;
      })() : ''}
    </div>
    <div class="center-actions">
      <button class="btn btn-primary" onclick="startQuiz()">Пройти диагностику заново</button>
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="exportProgress()">⬇ Скачать резервную копию</button>
        <button class="btn btn-ghost" onclick="triggerImportProgress()">⬆ Загрузить копию</button>
        <input id="importProgressInput" type="file" accept="application/json" style="display:none;" onchange="importProgress(this)">
      </div>
      <p style="font-size:12.5px;color:var(--text-faint);max-width:360px;margin:10px auto 0;">Прогресс хранится только в этом браузере. Скачай копию, чтобы не потерять её при смене устройства или очистке кэша.</p>
      <div style="margin-top:16px;"><button class="link-btn" onclick="resetProgress()">Сбросить весь прогресс</button></div>
    </div>
  </div>`;
}

/* ============ MASTER RENDER ============ */
// In-app routing: without this, every screen transition (quiz -> results ->
// practice -> roadmap ...) happens without touching browser history, so the
// back button doesn't step back through the app — it leaves the page entirely.
// syncRouting() pushes one history entry per screen change (never per same-screen
// re-render, e.g. ticking a week checkbox) and keeps the tab title in sync;
// the popstate listener below reverses it.
const SCREEN_TITLES = {
  home: 'PathFinder — найди своё направление',
  catalog: 'Каталог направлений — PathFinder',
  quiz: 'Тест — PathFinder',
  results: 'Результаты теста — PathFinder',
  practice: 'Практика — PathFinder',
  'practice-result-negative': 'Результат практики — PathFinder',
  roadmap: 'Дорожная карта — PathFinder',
  profile: 'Профиль — PathFinder',
  certificate: 'Сертификат — PathFinder',
  shared: 'Результаты теста — PathFinder',
};
function computeTitle(){
  const sp = state.selectedSphere && SPHERES[state.selectedSphere];
  if(sp && state.screen==='roadmap') return `Карта: ${sp.name} — PathFinder`;
  if(sp && state.screen==='practice') return `Практика: ${sp.name} — PathFinder`;
  if(sp && state.screen==='certificate') return `Сертификат: ${sp.name} — PathFinder`;
  return SCREEN_TITLES[state.screen] || SCREEN_TITLES.home;
}
let historyReady = false;
let lastPushedScreen = null;
let applyingHistoryPop = false;
function syncRouting(){
  document.title = computeTitle();
  const entry = {screen: state.screen, selectedSphere: state.selectedSphere};
  if(!historyReady){
    history.replaceState(entry, '', '#'+state.screen);
    historyReady = true;
    lastPushedScreen = state.screen;
    return;
  }
  if(applyingHistoryPop) return;
  if(state.screen !== lastPushedScreen){
    history.pushState(entry, '', '#'+state.screen);
    lastPushedScreen = state.screen;
  }
}
window.addEventListener('popstate', function(e){
  const entry = e.state;
  let screen = entry && entry.screen;
  let selectedSphere = entry ? entry.selectedSphere : state.selectedSphere;
  if(!screen) screen = (location.hash || '#home').slice(1);
  if(!['home','catalog','quiz','results','practice','practice-result-negative','roadmap','profile','certificate','shared'].includes(screen)) screen = 'home';
  if(selectedSphere && !SPHERES[selectedSphere]) selectedSphere = null;
  if((screen==='practice'||screen==='practice-result-negative'||screen==='roadmap'||screen==='certificate') && !selectedSphere) screen = 'home';
  if(screen==='certificate' && (!selectedSphere || !state.certifiedSpheres[selectedSphere])) screen = 'home';
  if(screen==='quiz' && !Array.isArray(state.answers)) screen = 'home';
  applyingHistoryPop = true;
  state.screen = screen;
  if(selectedSphere) state.selectedSphere = selectedSphere;
  lastPushedScreen = screen;
  render();
  applyingHistoryPop = false;
});
function prefersReducedMotion(){
  try{ return matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; }
}
function render(){
  let html='';
  if(state.screen==='home') html = renderHome();
  else if(state.screen==='catalog') html = renderCatalog();
  else if(state.screen==='quiz') html = renderQuiz();
  else if(state.screen==='results') html = renderResults();
  else if(state.screen==='practice') html = renderPractice();
  else if(state.screen==='practice-result-negative') html = renderPracticeNegative();
  else if(state.screen==='roadmap') html = renderRoadmap();
  else if(state.screen==='profile') html = renderProfile();
  else if(state.screen==='certificate') html = renderCertificate();
  else if(state.screen==='shared') html = renderShared();
  document.getElementById('app').innerHTML = html;
  renderNav();
  syncRouting();
  if(state.screen==='home') animateCounters();
  window.scrollTo({top:0,behavior: prefersReducedMotion() ? 'auto' : 'smooth'});
  saveState();
}

function toggleTheme(){
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if(isLight) document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme','light');
  try{ localStorage.setItem('pathfinder_theme', isLight ? 'dark' : 'light'); }catch(e){}
  updateThemeToggleIcon();
}
function updateThemeToggleIcon(){
  const btn = document.getElementById('themeToggleBtn');
  if(!btn) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  btn.textContent = isLight ? '🌙' : '☀️';
}

let sharedResultIds = [];

async function boot(){
  try {
    await loadAllData();
    initDerivedData();
  } catch(err){
    console.error('PathFinder: не удалось загрузить данные', err);
    const isFileProtocol = location.protocol === 'file:';
    document.getElementById('app').innerHTML = `
      <div class="boot-screen">
        <h3>Не получилось загрузить данные 😕</h3>
        <p>${isFileProtocol
          ? 'Страница открыта напрямую как файл (file://) — большинство браузеров блокирует загрузку локальных JSON-файлов в этом режиме. Запусти рядом с pathfinder.html любой локальный сервер, например:'
          : 'Проверь подключение и обнови страницу — если это повторяется, значит один из файлов в папке data/ повреждён (подробности ниже).'}</p>
        ${isFileProtocol ? '<div class="boot-error-detail">python3 -m http.server 8000\n# затем открой http://localhost:8000/pathfinder.html</div>' : ''}
        <div class="boot-error-detail">${String((err && err.message) || err).replace(/</g,'&lt;')}</div>
      </div>`;
    return;
  }

  state = loadState();

  try {
    const param = new URLSearchParams(location.search).get('r');
    if(param){
      const ids = param.split(',').filter(id=>SPHERES[id]);
      if(ids.length){ sharedResultIds = ids.slice(0,3); state.screen = 'shared'; }
    }
  } catch(e) { /* malformed link — ignore, fall back to normal state */ }

  render();
  updateThemeToggleIcon();
  appBooted = true;
}

document.addEventListener('keydown', function(e){
  if(state.screen !== 'quiz') return;
  if(e.key>='1' && e.key<='4'){
    const idx = parseInt(e.key,10)-1;
    const q = QUESTIONS[state.qIndex];
    if(q && q.o[idx]) selectAnswer(idx);
  } else if(e.key==='Backspace' || e.key==='ArrowLeft'){
    e.preventDefault();
    backQuiz();
  }
});

boot();
</script>
</body>
